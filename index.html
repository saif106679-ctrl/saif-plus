<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAIF TERMINAL AI</title>
    <style>
        :root { --green: #00ff41; --bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        
        body { 
            background: var(--bg); 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            color: var(--green);
        }

        .wrapper { 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            border: 1px solid #1a1a1a;
        }

        .header { 
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--green);
            font-size: 0.8rem;
            letter-spacing: 2px;
            background: #000;
        }

        #chat-box { 
            flex: 1;
            overflow-y: auto; 
            padding: 20px; 
            padding-bottom: 120px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: linear-gradient(rgba(0,255,65,0.02) 50%, rgba(0,0,0,0) 50%);
            background-size: 100% 4px;
        }

        .msg { max-width: 90%; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .sent { align-self: flex-start; color: #fff; border-right: 2px solid #fff; padding-right: 8px; }
        .sent::before { content: "> USER: "; font-size: 10px; color: #666; display: block; }
        
        .received { 
            align-self: flex-start; 
            padding: 8px;
            border: 1px solid var(--green);
            background: rgba(0, 255, 65, 0.05);
        }
        .received::before { content: "> SYSTEM: "; font-size: 10px; opacity: 0.7; display: block; }

        .input-bar { 
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            background: #000;
            padding: 15px 15px calc(20px + env(safe-area-inset-bottom));
            display: flex;
            border-top: 1px solid var(--green);
        }

        #uInput { 
            flex: 1; 
            border: none;
            background: transparent;
            color: var(--green);
            outline: none;
            font-size: 16px;
        }

        .send-btn { 
            background: var(--green); 
            color: #000; 
            border: none; 
            padding: 5px 15px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header">STATUS: ENCRYPTED_
