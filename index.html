<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIF PLUS AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --tg-blue: #2481cc; --tg-bg: #f0f2f5; --dark-black: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background-color: var(--tg-bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* صفحة التسجيل الاحترافية */
        #registration-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; background: linear-gradient(135deg, #ffffff 0%, #e6e6e6 100%); }
        .brand-name { font-size: 3.5rem; font-weight: 900; color: var(--dark-black); margin-bottom: 30px; letter-spacing: 2px; }
        .reg-card { background: var(--white); width: 100%; max-width: 400px; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn-start { width: 100%; padding: 18px; background: var(--dark-black); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-start:hover { background: #333; }

        /* واجهة الدردشة بتصميم تليجرام */
        #chat-page { display: none; flex-direction: column; height: 100vh; }
        .chat-header { background: var(--white); padding: 15px 20px; border-bottom: 1px solid #ddd; text-align: center; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 16px; line-height: 1.4; }
        .sent { align-self: flex-end; background: #effdde; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: var(--white); border-bottom-left-radius: 2px; }
        .input-area { background: var(--white); padding: 10px; display: flex; gap: 10px; align-items: center; }
        .send-btn { background: var(--tg-blue); color: white; width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div id="registration-page">
        <div class="brand-name">SAIF PLUS</div>
        <div class="reg-card">
            <h3 style="text-align: center; margin-bottom: 20px;">إنشاء حساب جديد</h3>
            <form id="regForm">
                <input type="text" id="name" placeholder="الاسم الكامل" required>
                <input type="number" id="age" placeholder="العمر" required>
                <select id="country" required>
                    <option value="" disabled selected>اختر الدولة</option>
                    <option value="البحرين">🇧🇭 البحرين</option>
                    <option value="السعودية">🇸🇦 السعودية</option>
                    <option value="الإمارات">🇦🇪 الإمارات</option>
                    <option value="الكويت">🇰🇼 الكويت</option>
                    <option value="قطر">🇶🇦 قطر</option>
                    <option value="عمان">🇴🇲 سلطنة عمان</option>
                </select>
                <button type="submit" class="btn-start">دخول النظام</button>
            </form>
        </div>
    </div>

    <div id="chat-page">
        <div class="chat-header"><h2>SAIF PLUS AI</h2></div>
        <div id="chat-container">
            <div class="msg received">مرحباً بك! أنا نظام سيف بلس المطور. تفضل بسؤالي.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="اكتب رسالتك هنا...">
            <button class="send-btn" onclick="askAI()">➤</button>
        </div>
    </div>
