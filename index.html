<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAIF PLUS AI | TERMINAL</title>
    <style>
        :root { 
            --hacker-green: #00ff41; 
            --dark-bg: #0a0a0a;
            --terminal-font: 'Courier New', Courier, monospace;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--terminal-font); }
        
        body { 
            background: var(--dark-bg); 
            height: 100vh; 
            height: -webkit-fill-available;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            color: var(--hacker-green);
        }

        .mobile-wrapper { 
            width: 100%; 
            max-width: 450px; 
            background: rgba(0, 0, 0, 0.95); 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            position: relative;
            border-left: 1px solid #1a1a1a;
            border-right: 1px solid #1a1a1a;
        }

        /* رأس الصفحة بأسلوب التيرمينال */
        .header { 
            height: 50px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-weight: bold;
            border-bottom: 1px solid var(--hacker-green);
            background: #000;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            text-shadow: 0 0 5px var(--hacker-green);
        }

        .header::before {
            content: "> ";
            animation: blink 1s infinite;
        }

        #chat-box { 
            flex: 1;
            overflow-y: auto; 
            padding: 20px; 
            padding-bottom: 120px; /* مساحة كافية للشريط السفلي */
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 100% 3px; /* تأثير الخطوط الأفقية القديمة */
        }

        .msg { 
            max-width: 90%; 
            padding: 10px; 
            font-size: 14px; 
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
        }

        /* رسالة المستخدم */
        .sent { 
            align-self: flex-start; 
            color: #fff;
            border-right: 2px solid #fff;
            padding-right: 10px;
        }
        .sent::before { content: "[USER@SAIF]: "; color: #888; font-size: 10px; display: block; }
