<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAIF TERMINAL AI</title>
    <style>
        :root { --green: #00ff41; --bg: #000000; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        
        body, html { 
            background: var(--bg); 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            display: flex;
            justify-content: center;
        }

        /* الحاوية الرئيسية */
        .main-container { 
            width: 100%; 
            max-width: 500px; 
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            border-left: 1px solid #1a1a1a;
            border-right: 1px solid #1a1a1a;
            position: relative;
            background: var(--bg);
        }

        /* الرأس */
        .terminal-header { 
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid var(--green);
            font-size: 11px;
            color: var(--green);
            background: #050505;
            flex-shrink: 0;
        }

        /* منطقة الرسائل - جعلتها مرنة لتترك مساحة للشريط السفلي */
        #chat-display { 
            flex: 1;
            overflow-y: auto; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
            /* منع اختفاء الرسائل خلف شريط الإدخال */
            padding-bottom: 20px;
        }

        .command-line { font-size: 14px; line-height: 1.5; word-wrap: break-word; margin-bottom: 5px; }
        .user-cmd { color: #ffffff; border-right: 2px solid var(--green); padding-right: 5px; }
        .sys-resp { color: var(--green); background: rgba(0, 255, 65, 0.05); padding: 5px; border: 1px dotted var(--green); }

        /* شريط الإدخال - تم تعديله ليكون ثابتاً ومرئياً */
        .input-area { 
            padding: 15px;
            background: #050505;
            border-top: 1px solid var(--green);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0; /* يمنع الشريط من التقلص أو الاختفاء */
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); /* دعم الهواتف */
        }

        .prompt { color: var(--green); font-weight: bold; }

        #uInput { 
            flex: 1; 
            border: none;
            background: transparent;
            color: var(--green);
            outline: none;
            font-size: 16px; /* يمنع الزووم في الآيفون */
            caret-color: var(--green);
        }

        .exec-btn { 
            background: var(--green); 
            color: #000; 
            border: none; 
            padding: 5px 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }

        /* إخفاء السكرول بار */
        #chat-display::-webkit-scrollbar { width: 3px; }
        #chat-display::-webkit-scrollbar-thumb { background: var(--green); }
    </style>
</head>
