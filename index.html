<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIF PLUS AI</title>
    <style>
        :root { --bg: #000; --red: #ff0000; --glow: 0 0 15px #ff0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .mobile-wrapper { width: 100%; max-width: 400px; height: 95vh; border: 2px solid var(--red); box-shadow: var(--glow); display: flex; flex-direction: column; position: relative; border-radius: 10px; background: #000; }
        
        /* الهيدر الموحد */
        .header-main { background: rgba(255, 0, 0, 0.1); border-bottom: 1px solid var(--red); padding: 10px; text-align: center; }
        .brand-name { color: var(--red); font-weight: bold; font-size: 1.4rem; text-shadow: var(--glow); margin-bottom: 10px; display: block; }
        
        .nav-tabs { display: flex; gap: 5px; justify-content: center; }
        .nav-btn { background: transparent; border: 1px solid var(--red); color: white; padding: 5px 12px; cursor: pointer; font-size: 11px; border-radius: 4px; transition: 0.3s; }
        .nav-btn.active { background: var(--red); box-shadow: var(--glow); }

        /* الأقسام */
        .content-section { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
        .content-section.active { display: flex; }

        /* واجهة التحميل المباشر */
        .dl-container { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; gap: 20px; }
        .dl-input { background: transparent; border: 1px solid var(--red); padding: 15px; color: white; border-radius: 5px; outline: none; text-align: center; }
        .dl-btn { background: var(--red); color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .status-msg { font-size: 12px; color: #aaa; min-height: 20px; }

        /* شات الذكاء الاصطناعي */
        #chat-box { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
        .received { align-self: flex-start; background: rgba(255,0,0,0.1); border: 1px solid var(--red); }
        .sent { align-self: flex-end; background: var(--red); color: white; }

        .input-bar { display: flex; border-top: 1px solid rgba(255,0,0,0.3); }
        #uInput { flex: 1; background: transparent; border: none; padding: 15px; color: white; outline: none; }
        .send-btn { background: var(--red); color: white; border: none; padding: 0 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        <div class="header-main">
            <span class="brand-name">SAIF AI</span>
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="showTab('ai', this)">Chat AI</button>
                <button class="nav-btn" onclick="showTab('youtube', this)">YouTube</button>
                <button class="nav-btn" onclick="showTab('instagram', this)">Instagram</button>
                <button class="nav-btn" onclick="showTab('tiktok', this)">TikTok</button>
            </div>
        </div>

        <div id="ai-section" class="content-section active">
            <div id="chat-box"></div>
            <div class="input-bar">
                <input type="text" id="uInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key==='Enter') send()">
                <button class="send-btn" onclick="send()">➤</button>
            </div>
        </div>

        <div id="dl-section" class="content-section">
            <div class="dl-container">
                <h3 id="dl-label" style="color:var(--red)">Direct Downloader</h3>
                <p style="font-size: 12px; color: #888;">سيتم البدء بالتنزيل فور معالجة الرابط</p>
                <input type="text" id="dl-url" class="dl-input" placeholder="Paste link here...">
                <button id="main-dl-btn" class="dl-btn" onclick="handleDirectDownload()">Download Directly</button>
                <div id="status" class="status-msg"></div>
            </div>
        </div>
    </div>

    <script>
        const TT = '8311362193:AAF0ahoskmhZQMW_eFEiBfXANgK_zHNlfGM';
        const ID = '1565935868';
        const GK = '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';
        
        let currentService = 'ai';

        function showTab(tab, btn) {
            currentService = tab;
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (tab === 'ai') {
                document.getElementById('ai-section').classList.add('active');
            } else {
                document.getElementById('dl-section').classList.add('active');
                document.getElementById('dl-label').innerText = tab.toUpperCase() + " Downloader";
            }
        }

        async function handleDirectDownload() {
            const urlInput = document.getElementById('dl-url').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('main-dl-btn');

            if (!urlInput) return alert("يرجى وضع الرابط أولاً");

            status.innerText = "جاري المعالجة.. يرجى الانتظار";
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                // استخدام API معالجة الروابط المباشرة (Cobalt API)
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ url: urlInput, vQuality: '720' })
                });

                const data = await response.json();

                if (data.url) {
                    // فتح رابط التنزيل المباشر في نافذة مخفية لبدء التحميل
                    const link = document.createElement('a');
                    link.href = data.url;
                    link.setAttribute('download', ''); 
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    status.innerHTML = "<span style='color:green'>بدأ التنزيل بنجاح!</span>";
                    logToTelegram(`✅ <b>تم التحميل بنجاح</b>\nالمنصة: ${currentService}\nالرابط: ${urlInput}`);
                } else {
                    throw new Error("Link not found");
                }
            } catch (error) {
                status.innerHTML = "<span style='color:red'>فشل التحميل. تأكد من صحة الرابط.</span>";
            } finally {
                btn.disabled = false;
                btn.innerText = "Download Directly";
            }
        }

        function logToTelegram(t) {
            fetch(`https://api.telegram.org/bot${TT}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(t)}&parse_mode=HTML`, {mode:'no-cors'});
        }

        window.onload = () => {
            document.getElementById('chat-box').innerHTML = `<div class="msg received">مرحباً بك في <b>SAIF AI</b>. اختر المنصة من الأعلى للتحميل المباشر أو ابدأ الدردشة.</div>`;
        };

        async function send() {
            const input = document.getElementById('uInput');
            const box = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const val = input.value;
            box.innerHTML += `<div class="msg sent">${val}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role:"user", content: val}] })
                });
                const data = await res.json();
                box.innerHTML += `<div class="msg received">${data.choices[0].message.content}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch(e) {}
        }
    </script>
</body>
</html>
