<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAIF TERMINAL AI</title>
    <style>
        :root { --green: #00ff41; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        
        body, html { 
            background: var(--bg); height: 100vh; width: 100vw; overflow: hidden; 
            display: flex; justify-content: center;
        }

        .terminal { 
            width: 100%; max-width: 500px; height: 100dvh; 
            display: flex; flex-direction: column; 
            border: 1px solid var(--green); position: relative;
        }

        .header { 
            padding: 10px; text-align: center; border-bottom: 1px solid var(--green);
            font-size: 11px; color: var(--green); background: #050505;
        }

        #screen { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            background: linear-gradient(rgba(0,255,65,0.02) 1px, transparent 1px);
            background-size: 100% 3px;
        }

        .line { font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .u-line { color: #fff; }
        .s-line { color: var(--green); padding: 5px; background: rgba(0,255,65,0.05); border-right: 2px solid var(--green); }

        .input-zone { 
            padding: 15px; background: #000; border-top: 1px solid var(--green);
            display: flex; align-items: center; gap: 8px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        #uInput { 
            flex: 1; border: none; background: transparent; color: var(--green);
            outline: none; font-size: 16px; caret-color: #fff;
        }

        .btn-exec { 
            background: var(--green); color: #000; border: none;
            padding: 6px 12px; font-weight: bold; cursor: pointer;
        }

        #screen::-webkit-scrollbar { width: 3px; }
        #screen::-webkit-scrollbar-thumb { background: var(--green); }
    </style>
</head>
