<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIF PLUS AI | Black Edition</title>
    <style>
        /* إعدادات الألوان للهوية الجديدة */
        :root { 
            --dark-bg: #0a0a0a; /* أسود عميق للأطراف */
            --glass-black: rgba(17, 24, 39, 0.95); /* أسود ضبابي */
            --tg-blue: #2481cc;
            --text-gray: #9ca3af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: sans-serif; 
            background-color: var(--dark-bg); /* تغيير الخلفية من الأزرق للأسود */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        .mobile-wrapper { 
            width: 100%; 
            max-width: 450px; 
            background: var(--white); 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 40px rgba(0,0,0,0.7); 
            position: relative; 
            z-index: 10; 
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        .header { 
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            border-bottom: 1px solid #eee; 
            font-size: 1.2rem; 
            background: #fff;
        }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #f9fafb; 
            background-image: radial-gradient(#d1d5db 0.5px, transparent 0.5px); 
            background-size: 20px 20px; 
        }

        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .sent { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; border: 1px solid #eee; border-bottom-left-radius: 2px; }
        
        .preview-img { max-width: 100%; border-radius: 10px; margin-top: 5px; border: 1px solid #ddd; }

        .input-bar { padding: 15px; display: flex; gap: 8px; border-top: 1px solid #eee; background: white; align-items: center; }
        #uInput { flex: 1; border: none; background: #f3f4f6; padding: 12px; border-radius: 10px; outline: none; }
        
        .btn { background: var(--tg-blue); color: white; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .attach-btn { background: #f3f4f6; color: #555; font-size: 22px; }
        #fileInput { display: none; }

        #image-preview-area { display:none; padding:10px; background:#fff; border-top:1px solid #eee; text-align:center; }
    </style>
</head>
<body onload="init()">

    <div class="mobile-wrapper">
        <div class="header">SAIF PLUS AI VISION</div>
        <div id="chat-box"></div>
        
        <div id="image-preview-area">
            <img id="img-to-send" style="height:60px; border-radius:5px;">
            <button onclick="cancelImage()" style="color:red; background:none; border:none; margin-right:10px; cursor:pointer;">إلغاء</button>
        </div>

        <div class="input-bar">
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage(this)">
            <button class="btn attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="uInput" placeholder="اسأل أو ارفع صورة..." onkeypress="if(event.key==='Enter') send()">
            <button class="btn" onclick="send()">➤</button>
        </div>
    </div>
