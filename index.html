<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIF PLUS AI</title>
    <style>
        /* إعدادات التصميم الأسود والنيون الأحمر */
        :root {
            --bg-color: #000000;
            --neon-red: #ff0000;
            --glow: 0 0 15px rgba(255, 0, 0, 0.7);
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* حاوية الموبايل مع توهج النيون */
        .mobile-wrapper {
            width: 100%;
            max-width: 400px;
            height: 90vh;
            background: #000;
            border: 2px solid var(--neon-red);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--glow), inset 0 0 10px rgba(255, 0, 0, 0.3);
            position: relative;
        }

        /* الهيدر */
        .header {
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--neon-red);
            border-bottom: 1px solid rgba(255, 0, 0, 0.3);
            text-shadow: var(--glow);
        }

        /* صندوق الدردشة */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-red) #000;
        }

        /* تنسيق الرسائل */
        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
        }

        .received {
            align-self: flex-start;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid var(--neon-red);
            color: var(--text-color);
            border-bottom-left-radius: 0;
        }

        .sent {
            align-self: flex-end;
            background: var(--neon-red);
            color: white;
            border-bottom-right-radius: 0;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* شريط الإدخال السفلي */
        .input-bar {
            padding: 10px;
            display: flex;
            border-top: 1px solid rgba(255, 0, 0, 0.3);
            background: #000;
        }

        #uInput {
            flex: 1;
            border: 1px solid var(--neon-red);
            background: transparent;
            color: white;
            padding: 12px;
            outline: none;
            border-radius: 0;
        }

        .send-btn {
            background: var(--neon-red);
            color: white;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .send-btn:hover {
            background: #cc0000;
            box-shadow: var(--glow);
        }

        /* إخفاء السكرول بار للمتصفحات */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--neon-red); }
    </style>
</head>

        </div>
