<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAIF PLUS AI</title>
    <style>
        :root { 
            --blue: #e0f2fe; 
            --tg: #2481cc; 
            --dark: #111827;
            /* حساب الارتفاع الديناميكي للمتصفحات الحديثة */
            --safe-height: 100vh;
            --safe-height: 100dvh; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            height: var(--safe-height);
            width: 100vw;
            overflow: hidden;
            /* دعم هواتف آيفون الحديثة ذات النتوء السفلي */
            padding-bottom: env(safe-area-inset-bottom);
        }

        .mobile-wrapper { 
            width: 100%; 
            max-width: 420px; 
            background: white; 
            height: var(--safe-height);
            display: flex; 
            flex-direction: column; 
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        .header { 
            padding: env(safe-area-inset-top) 15px 12px 15px; /* حماية الجزء العلوي في سناب وآيفون */
            text-align: center; 
            font-weight: bold; 
            border-bottom: 1px solid #f0f0f0; 
            font-size: 1.1rem; 
            background: white;
            flex-shrink: 0;
        }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #f9fafb;
            /* منع السحب لأسفل الذي قد يغلق المتصفح في سناب شات */
            overscroll-behavior-y: contain; 
        }

        .msg { 
            max-width: 85%; 
            padding: 10px 15px; 
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.5; 
            word-wrap: break-word;
            position: relative;
        }

        .sent { 
            align-self: flex-end; 
            background: var(--tg); 
            color: white;
            border-bottom-right-radius: 4px; 
        }

        .received { 
            align-self: flex-start; 
            background: #e9e9eb; 
            color: #1a1a1a;
            border-bottom-left-radius: 4px; 
        }

        /* تحسين منطقة الإدخال لتجنب الاختفاء تحت لوحة المفاتيح */
