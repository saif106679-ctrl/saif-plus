<style>
:root{
    --bg:#000000;
    --green:#00ff9c;
    --green-dim:#00c97a;
    --border:#003b24;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family: "Courier New", monospace;
    background: var(--bg);
    display:flex;
    justify-content:center;
    height:100vh;
    overflow:hidden;
    color:var(--green);
}

/* الجهاز */
.mobile-wrapper{
    width:100%;
    max-width:450px;
    height:100%;
    display:flex;
    flex-direction:column;
    border:1px solid var(--border);
    background:black;
}

/* الهيدر */
.header{
    padding:15px;
    text-align:center;
    font-weight:bold;
    border-bottom:1px solid var(--border);
    letter-spacing:2px;
    color:var(--green);
}

/* منطقة المحادثة */
#chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;

    background:black;
}

/* الرسائل */
.msg{
    max-width:90%;
    padding:10px;
    font-size:14px;
    border-left:3px solid var(--green);
    background:#021b13;
}

/* رسالة المستخدم */
.sent{
    align-self:flex-end;
    border-left:3px solid #00ffea;
    color:#00ffea;
}

/* رسالة الذكاء */
.received{
    align-self:flex-start;
}

/* شريط الإدخال */
.input-bar{
    padding:12px;
    display:flex;
    gap:10px;
    border-top:1px solid var(--border);
}

/* صندوق الكتابة */
#uInput{
    flex:1;
    background:black;
    border:1px solid var(--border);
    padding:10px;
    color:var(--green);
    outline:none;
    font-family: "Courier New", monospace;
}

/* زر الإرسال */
.send-btn{
    background:black;
    border:1px solid var(--green);
    color:var(--green);
    width:45px;
    height:45px;
    cursor:pointer;
}

/* تأثير الكتابة */
.msg::after{
    content:"_";
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:0}
    50%{opacity:1}
    100%{opacity:0}
}
</style>
