<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>SAIF AI</title>
</head>

<body style="background:black;color:#00ff00;font-family:monospace">

<h1>SAIF AI TERMINAL</h1>

<input id="msg">
<button onclick="send()">ارسال</button>

<div id="chat"></div>

<script>

async function send(){

let msg=document.getElementById("msg").value

let res=await fetch("YOUR_SERVER/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({msg:msg})
})

let data=await res.json()

document.getElementById("chat").innerHTML+=
"<p>"+data.reply+"</p>"

}

</script>

</body>
</html>
