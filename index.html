    function getDeviceInfo() {
        const ua = navigator.userAgent;
        let device = "كمبيوتر (Desktop)";
        let os = "غير معروف";

        if (/android/i.test(ua)) {
            device = "أندرويد 📱";
            os = "Android";
        } else if (/iPad|iPhone|iPod/.test(ua)) {
            device = "آيفون/آيباد 🍎";
            os = "iOS";
        } else if (/Windows/i.test(ua)) {
            os = "Windows";
        } else if (/Mac/i.test(ua)) {
            os = "macOS";
        } else if (/Linux/i.test(ua)) {
            os = "Linux";
        }

        return `${device} (${os})`;
    }
