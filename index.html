<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAIF AI</title>

<style>

body{
background:black;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:#ff0033;
}

/* صندوق الدردشة */

.chat-container{
width:360px;
height:600px;
border:2px solid #ff0033;
border-radius:10px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 0 20px #ff0033;
}

/* العنوان */

.header{
text-align:center;
padding:10px;
border-bottom:1px solid #ff0033;
font-size:20px;
}

/* الرسائل */

.chat{
flex:1;
padding:10px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

/* الرسالة */

.message{
margin:8px 0;
padding:8px 12px;
border-radius:6px;
max-width:80%;
}

/* رسالة المستخدم */

.user{
background:#3b0008;
align-self:flex-end;
}

/* رسالة الذكاء */

.ai{
background:#1a0003;
align-self:flex-start;
}

/* منطقة الإدخال */

.input-area{
display:flex;
border-top:1px solid #ff0033;
}

input{
flex:1;
padding:10px;
background:black;
border:none;
color:#ff0033;
outline:none;
}

button{
background:#ff0033;
border:none;
padding:10px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
SAIF AI
</div>

<div class="chat" id="chat">

<div class="message ai">
👋 مرحبا أنا SAIF AI كيف يمكنني مساعدتك؟
</div>

</div>

<div class="input-area">

<input id="msg" placeholder="اكتب رسالتك...">

<button onclick="send()">ارسال</button>

</div>

</div>

<script>

const API_KEY="PUT_GROQ_KEY_HERE"

async function send(){

let input=document.getElementById("msg")
let text=input.value

if(text=="") return

let chat=document.getElementById("chat")

chat.innerHTML+=`
<div class="message user">${text}</div>
`

chat.scrollTop=chat.scrollHeight

input.value=""

let response=await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({
model:"llama3-70b-8192",
messages:[
{
role:"user",
content:text
}
]
})
})

let data=await response.json()

let reply=data.choices[0].message.content

chat.innerHTML+=`
<div class="message ai">${reply}</div>
`

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
