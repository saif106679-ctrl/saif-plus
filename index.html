<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAIF PLUS AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-blue: #2481cc;
            --soft-blue: #e0f2fe;
            --dark-black: #111827;
            --white: #ffffff;
        }

        /* إصلاحات شاملة للمتصفحات */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0;
            background-color: var(--soft-blue);
            display: flex; justify-content: center;
            height: 100vh; height: -webkit-fill-available; /* لسفاري */
            overflow: hidden;
        }

        .mobile-wrapper {
            width: 100%; max-width: 450px;
            background-color: var(--white);
            display: flex; flex-direction: column;
            box-shadow: 0 0 25px rgba(0,0,0,0.1);
            height: 100%;
        }

        #registration-page, #chat-page {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }

        .brand-name { font-size: 3.5rem; font-weight: 900; color: var(--dark-black); text-align: center; margin: 40px 0; }
        .reg-card { padding: 0 30px; flex: 1; }
        
        input, select {
            width: 100%; padding: 15px; margin: 10px 0;
            border: 2px solid #f0f0f0; border-radius: 12px;
            font-size: 16px; outline: none; -webkit-appearance: none;
        }

        .btn-start {
            width: 100%; padding: 18px; background: var(--dark-black);
            color: white; border: none; border-radius: 12px;
            font-weight: bold; font-size: 18px; cursor: pointer;
        }

        #chat-page { display: none; }
        .chat-header { background: var(--white); padding: 15px; border-bottom: 1px solid #eee; text-align: center; font-weight: 900; }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
            background: linear-gradient(rgba(248, 250, 252, 0.95), rgba(248, 250, 252, 0.95)), 
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
