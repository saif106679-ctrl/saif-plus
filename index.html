<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIF PLUS AI - Vision</title>
    <style>
        :root { --bg: #000; --red: #ff0000; --glow: 0 0 15px #ff0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .mobile-wrapper { width: 100%; max-width: 400px; height: 95vh; border: 2px solid var(--red); box-shadow: var(--glow); display: flex; flex-direction: column; position: relative; border-radius: 10px; background: #000; }
        .header-main { background: rgba(255, 0, 0, 0.1); border-bottom: 1px solid var(--red); padding: 10px; text-align: center; }
        .brand-name { color: var(--red); font-weight: bold; font-size: 1.4rem; text-shadow: var(--glow); display: block; margin-bottom: 5px; }
        .nav-tabs { display: flex; gap: 5px; justify-content: center; }
        .nav-btn { background: transparent; border: 1px solid var(--red); color: white; padding: 4px 10px; cursor: pointer; font-size: 11px; border-radius: 4px; }
        .nav-btn.active { background: var(--red); box-shadow: var(--glow); }
        .content-section { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
        .content-section.active { display: flex; }
        #chat-box { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.5; position: relative; }
        .received { align-self: flex-start; background: rgba(255,0,0,0.1); border: 1px solid var(--red); }
        .sent { align-self: flex-end; background: var(--red); color: white; }
        .msg img { max-width: 100%; border-radius: 5px; margin-top: 5px; border: 1px solid rgba(255,255,255,0.2); }
        
        /* شريط الإدخال المطور */
        .input-bar { display: flex; align-items: center; border-top: 1px solid rgba(255,0,0,0.3); padding: 5px; background: #050000; }
        #uInput { flex: 1; background: transparent; border: none; padding: 12px; color: white; outline: none; font-size: 14px; }
        .icon-btn { background: transparent; border: none; color: var(--red); font-size: 20px; cursor: pointer; padding: 10px; transition: 0.3s; }
        .icon-btn:hover { text-shadow: var(--glow); transform: scale(1.1); }
        #file-input { display: none; }

        /* واجهة التحميل */
        .dl-container { padding: 30px 20px; text-align: center; display: flex; flex-direction: column; gap: 15px; }
        .dl-input { background: transparent; border: 1px solid var(--red); padding: 12px; color: white; border-radius: 5px; outline: none; }
        .dl-btn { background: var(--red); color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        <div class="header-main">
            <span class="brand-name">SAIF AI</span>
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="showTab('ai', this)">Chat AI</button>
                <button class="nav-btn" onclick="showTab('youtube', this)">YouTube</button>
                <button class="nav-btn" onclick="showTab('instagram', this)">Instagram</button>
                <button class="nav-btn" onclick="showTab('tiktok', this)">TikTok</button>
            </div>
        </div>

        <div id="ai-section" class="content-section active">
            <div id="chat-box"></div>
            <div class="input-bar">
                <input type="file" id="file-input" accept="image/*" onchange="handleImage(this)">
                <button class="icon-btn" onclick="document.getElementById('file-input').click()">📎</button>
                <input type="text" id="uInput" placeholder="اسألني عن صورة أو نص..." onkeypress="if(event.key==='Enter') send()">
                <button class="icon-btn" onclick="send()">➤</button>
            </div>
        </div>

        <div id="dl-section" class="content-section">
            <div class="dl-container">
                <h3 id="dl-label" style="color:var(--red)">Downloader</h3>
                <input type="text" id="dl-url" class="dl-input" placeholder="ضع الرابط هنا...">
                <button class="dl-btn" onclick="processDownload()">تحميل سريع</button>
                <div id="status" style="font-size: 12px; margin-top: 10px;"></div>
            </div>
        </div>
    </div>

    <script>
        const TT = '8311362193:AAF0ahoskmhZQMW_eFEiBfXANgK_zHNlfGM';
        const ID = '1565935868';
        const GK = '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';
        
        let brain = [{ role: "system", content: "أنت SAIF PLUS AI مساعد ذكي بلهجة خليجية خبير في تحليل الصور." }];
        let selectedImageBase64 = null;

        function showTab(tab, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (tab === 'ai') document.getElementById('ai-section').classList.add('active');
            else {
                document.getElementById('dl-section').classList.add('active');
                document.getElementById('dl-label').innerText = tab.toUpperCase();
            }
        }

        // معالجة اختيار الصورة
        function handleImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImageBase64 = e.target.result;
                    const box = document.getElementById('chat-box');
                    box.innerHTML += `<div class="msg sent"><i>تم إرفاق صورة.. جاري التحليل</i><br><img src="${selectedImageBase64}"></div>`;
                    box.scrollTop = box.scrollHeight;
                    send(); // إرسال تلقائي فور الاختيار كما طلبت
                };
                reader.readAsDataURL(file);
            }
        }

        async function send() {
            const input = document.getElementById('uInput');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();
            
            if (!text && !selectedImageBase64) return;

            if (text && !selectedImageBase64) {
                box.innerHTML += `<div class="msg sent">${text}</div>`;
            }
            
            input.value = "";
            box.scrollTop = box.scrollHeight;

            // تجهيز محتوى الرسالة لـ Groq
            let messageContent = [];
            if (text) messageContent.push({ type: "text", text: text });
            if (selectedImageBase64) {
                messageContent.push({
                    type: "image_url",
                    image_url: { url: selectedImageBase64 }
                });
            }

            // إذا أرسل صورة بدون نص، نضيف نصاً افتراضياً لكي لا يحدث خطأ
            if (messageContent.length === 1 && selectedImageBase64) {
                messageContent.unshift({ type: "text", text: "ماذا يوجد في هذه الصورة؟" });
            }

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview", // الموديل الخاص بالرؤية
                        messages: [...brain, { role: "user", content: messageContent }],
                        max_tokens: 500
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                box.innerHTML += `<div class="msg received">${reply}</div>`;
                box.scrollTop = box.scrollHeight;
                
                // تصفير الصورة بعد الإرسال
                selectedImageBase64 = null;
                document.getElementById('file-input').value = "";
                
            } catch (e) {
                box.innerHTML += `<div class="msg received">حدث خطأ في معالجة الصورة.</div>`;
            }
        }

        function processDownload() {
            const url = document.getElementById('dl-url').value;
            if(url) window.open("https://9xbuddy.com/process?url=" + encodeURIComponent(url), '_blank');
        }

        window.onload = () => {
            document.getElementById('chat-box').innerHTML = `<div class="msg received">أهلاً بك يا <b>أسامة</b>. يمكنك الآن إرسال صور لتحليلها عبر أيقونة المشبك 📎</div>`;
        };
    </script>
</body>
</html>
