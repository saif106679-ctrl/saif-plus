<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>SAIF PLUS AI</title>
    <style>
        :root { --blue: #2481cc; --soft-blue: #e0f2fe; --black: #111827; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: var(--soft-blue); display: flex; justify-content: center; height: 100vh; }
        
        .mobile-wrapper { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        #registration-page, #chat-page { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        #chat-page { display: none; padding: 0; }

        .brand { font-size: 3rem; font-weight: bold; text-align: center; margin: 40px 0; color: var(--black); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn { width: 100%; padding: 18px; background: var(--black); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        #chat-container { flex: 1; overflow-y: auto; padding: 15px; background: #f8fafc; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.4; font-size: 15px; }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; border: 1px solid #eee; }
        
        .input-area { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        #uInp { flex: 1; margin: 0; }
    </style>
</head>
